<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HCE Logo Kit | Hudson Community Enterprises</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="logo-kit">
      <section class="page-hero compact">
        <p class="eyebrow">Brand Assets</p>
        <h1>Hudson Community Enterprises logo system concept.</h1>
        <p>Exploratory SVG directions for review. The active website currently uses the approved raster concept logo.</p>
      </section>
      <section class="section logo-kit-grid">
        <article>
          <span>Primary</span>
          <img src="./assets/hce-logo-primary.svg" alt="HCE primary logo" />
          <a href="./assets/hce-logo-primary.svg">Open SVG</a>
        </article>
        <article>
          <span>Compact H Mark</span>
          <img class="logo-mark-preview" src="./assets/hce-mark-icon.svg" alt="HCE compact H mark" />
          <a href="./assets/hce-mark-icon.svg">Open SVG</a>
        </article>
        <article>
          <span>One Color</span>
          <img src="./assets/hce-logo-one-color.svg" alt="HCE one-color logo" />
          <a href="./assets/hce-logo-one-color.svg">Open SVG</a>
        </article>
        <article class="dark-preview">
          <span>Reverse</span>
          <img src="./assets/hce-logo-reverse.svg" alt="HCE reverse logo" />
          <a href="./assets/hce-logo-reverse.svg">Open SVG</a>
        </article>
      </section>
      <section class="section logo-board-preview">
        <img src="./assets/hce-logo-system.svg" alt="HCE logo system board" />
      </section>
    </main>
  </body>
</html>
